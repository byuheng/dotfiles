# --- Terminal & UI ---
terminal=yes
force-window=no
no-video
vid=no
no-osc
no-osd-bar
term-osd=no
keep-open=yes

# --- Audio & Performance ---
ao=pipewire
ytdl-format=ba[acodec=opus]/ba/b
gapless-audio=yes
volume=80
volume-max=130

# --- Logic & Playlists ---
shuffle=yes
loop-playlist=inf
prefetch-playlist=yes

# --- Network & YT-DLP Fixes ---
cache=yes
demuxer-max-bytes=120MiB
demuxer-readahead-secs=30

# FIX: Pass ignore-errors to yt-dlp correctly
ytdl-raw-options=cookies-from-browser=firefox,ignore-errors=,yes-playlist=

# --- Clean Logging ---
quiet=yes
msg-level=all=no
msg-level=status=info
msg-level=ytdl_hook=error

# --- The "One-Line" Status Bar ---
term-status-msg="\r▶ ${?metadata/by-key/artist:${metadata/by-key/artist} - }${?title:${title}}${!title:${filename}} [%${playtime-remaining} left]   "



